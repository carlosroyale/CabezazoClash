<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso - Cabezazo Clash</title>
  <link rel="icon" type="image/x-icon" href="../assets/icon/favicon.ico">
  <link rel="stylesheet" href="login.css?v=2">
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css'>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
</head>
<body>
<div id="orientation-warning">
  <div class="orientation-content">
    <i class="bi bi-phone-landscape"></i>
    <h2>¡Gira tu dispositivo!</h2>
    <p>Esta aplicación está diseñada para usarse en modo horizontal.</p>
  </div>
</div>
<div class="card">
  <img src="../assets/img/logo129.png" alt="Cabezazo Clash Logo" class="logo">
  <h1 class="title">Cabezazo Clash</h1>

  <div id="paso-correo">
    <h2 class="subtitle">Introduce tu correo para jugar</h2>
    <div id="error-correo" class="mensaje-error" style="color: #d32f2f; margin-bottom: 10px;"></div>

    <form id="form-correo">
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" placeholder="jugador@ejemplo.com" required />
      </div>
      <button type="submit" id="btn-comprobar-correo" class="btn">Continuar</button>
    </form>
  </div>

  <div id="paso-registro" class="hidden">
    <h2 class="subtitle">¡Crea tu perfil de jugador!</h2>
    <div id="error-registro" class="mensaje-error" style="color: #d32f2f; margin-bottom: 10px;"></div>

    <form id="form-registro">
      <div class="form-group">
        <label for="reg-username">Nombre de usuario*</label>
        <input type="text" id="reg-username" placeholder="Ej: ClashMaster99" required maxlength="32" />
      </div>
      <div class="form-group">
        <label for="reg-nombre">Nombre real*</label>
        <input type="text" id="reg-nombre" placeholder="Bartolomé" required maxlength="32" />
      </div>
      <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
          <label for="reg-apellido1">Primer apellido*</label>
          <input type="text" id="reg-apellido1" placeholder="Palou" required maxlength="32" />
        </div>
        <div class="form-group" style="flex: 1;">
          <label for="reg-apellido2">Segundo apellido</label>
          <input type="text" id="reg-apellido2" placeholder="Balaguer" maxlength="32" />
        </div>
      </div>
      <p style="text-align: left; color: #888888; margin-top: 0;">Los campos con * son obligatorios.</p>

      <button type="submit" id="btn-registrar" class="btn">Crear Cuenta y Enviar Código</button>
      <button type="button" id="btn-volver-registro" class="btn btn-secondary">Cambiar correo</button>
    </form>
  </div>

  <div id="paso-codigo" class="hidden">
    <h2 class="subtitle">Hemos enviado un código a <br><b id="correo-mostrado" style="color: #5c2d91;"></b></h2>
    <div id="error-codigo" class="mensaje-error" style="color: #d32f2f; margin-bottom: 10px;"></div>

    <form id="form-codigo">
      <div class="form-group">
        <label for="codigo-otp">Código de 6 dígitos</label>
        <input type="text" id="codigo-otp" maxlength="6" pattern="\d{6}" placeholder="------" autocomplete="one-time-code" required />
      </div>
      <button type="submit" id="btn-entrar" class="btn">Entrar al Juego</button>
      <button type="button" id="btn-volver-codigo" class="btn btn-secondary">Usar otro correo</button>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
