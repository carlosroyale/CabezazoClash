<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cabezazo Clash</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div class="stadium">
    <div class="sky"></div>
    <div class="stands"></div>
    <div class="field"></div>
  </div>

  <!-- Pantalla 1: Inicio -->
  <section id="screen-start" class="screen active">
    <div class="card">
      <h1 class="title">Cabezazo Clash</h1>

      <div class="buttons">
        <button id="btn-play" class="btn">Jugar</button>
        <button id="btn-options" class="btn btn-secondary">Opciones</button>
      </div>

      <p class="footer">Pulsa “Jugar” para comenzar</p>
    </div>
  </section>

  <!-- Pantalla 2: Selección de nivel -->
  <section id="screen-level" class="screen">
    <div class="card">
      <h2 class="subtitle">Nivel</h2>

      <div class="buttons">
        <button id="btn-basic" class="btn">BÁSICO</button>
        <button id="btn-advanced" class="btn">AVANZADO</button>
      </div>

      <button id="btn-back" class="link-btn">← Volver</button>
    </div>
  </section>

  <!-- Pantalla 3: Opciones -->
  <section id="screen-options" class="screen">
    <div class="card">
      <h2 class="subtitle">Opciones</h2>

      <div class="option-row">
        <span>Música</span>
        <button id="toggle-music" class="toggle">ON</button>
      </div>

      <div class="option-row">
        <span>Sonidos</span>
        <button id="toggle-sfx" class="toggle">ON</button>
      </div>

      <div class="option-row">
        <span>Volumen</span>
        <input id="volume" class="slider" type="range" min="0" max="100" value="70">
        <span id="volume-value" class="small">70%</span>
      </div>

      <div class="controls-box">
        <h3 class="controls-title">Controles</h3>
        <ul class="controls-list">
          <li><b>Jugador 1:</b> A/D mover · W saltar · Espacio chutar</li>
          <li><b>Jugador 2:</b> ←/→ mover · ↑ saltar · Enter chutar</li>
        </ul>
      </div>

      <button id="btn-options-back" class="link-btn">← Volver</button>
    </div>
  </section>

  <!-- Pantalla 4: Juego -->
  <section id="screen-game" class="screen">
    <div class="game-wrap">
      <div class="hud">
        <div id="score" class="score">0 - 0</div>
        <div class="hint">ESC: volver · R: reiniciar</div>
      </div>
    </div>
  </section>

  <!-- música de fondo -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/audio/SoundTrackHS.ogg" type="audio/ogg">
    <source src="assets/audio/SoundTrackHS.mp3" type="audio/mpeg">
  </audio>

  <script src="game.js"></script>
  <script src="main.js"></script>
</body>
</html>
