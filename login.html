<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inicio de Sesión - Cabezazo Clash</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .form-group input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #d4a1d6, #5c2d91, #2e7d32);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .screen {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <section id="login-screen" class="screen active">
    <div class="card">
      <h1 class="title">Cabezazo Clash</h1>
      <h2 class="subtitle">Inicia Sesión o Regístrate</h2>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
        </div>

        <button type="submit" class="btn">Iniciar Sesión</button>
      </form>

      <div class="divider">o</div>

      <button id="btn-register" class="btn btn-secondary">Registrarse</button>
    </div>
  </section>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(event) {
      event.preventDefault();
      // Aquí puedes añadir lógica para validar el inicio de sesión
      window.location.href = 'index.html';
    });

    document.getElementById('btn-register').addEventListener('click', function() {
      // Mostrar un formulario de registro
      const registerFormHtml = `
        <form id="register-form">
          <div class="form-group">
            <label for="new-username">Nuevo Usuario</label>
            <input type="text" id="new-username" name="new-username" placeholder="Ingresa tu usuario" required />
          </div>

          <div class="form-group">
            <label for="new-password">Nueva Contraseña</label>
            <input type="password" id="new-password" name="new-password" placeholder="Ingresa tu contraseña" required />
          </div>

          <button type="submit" class="btn">Registrarse</button>
          <button type="button" id="cancel-register" class="btn btn-secondary">Cancelar</button>
        </form>
      `;

      const card = document.querySelector('.card');
      card.innerHTML = registerFormHtml;

      document.getElementById('register-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const newUsername = document.getElementById('new-username').value;
        const newPassword = document.getElementById('new-password').value;

        // Simular registro (aquí puedes añadir lógica para guardar el usuario)
        alert(`Usuario ${newUsername} registrado con éxito.`);

        // Volver al formulario de inicio de sesión
        window.location.reload();
      });

      document.getElementById('cancel-register').addEventListener('click', function() {
        // Volver al formulario de inicio de sesión
        window.location.reload();
      });
    });
  </script>
</body>
</html>
